<div class="sort" [class.sort--open]="isOpen()">

<button class="sort__trigger" 
  type="button"
  [attr.aria-expanded]="isOpen()"
  aria-haspopup="listbox"
  (click)="toggle()">
  <span class="sort__label">Sort by categories</span>
  <span class="sort__arrow" aria-hidden="true">
    <img class="sort__arrow--closed" src="assets/images/sort-arrow-white.svg" alt="">
    <img class="sort__arrow--open" src="assets/images/sort-arrow-orange.svg" alt="">
  </span>
</button>

  @if (selected()) {
    <span class="sort__selected">{{ selected() }}</span>
  }

  @if (isOpen()) {
    <ul class="sort__list" role="listbox" aria-label="Categories">
      @for (cat of categories; track cat) {
        <li 
          class="sort__item"
          role="option"
          [attr.aria-selected]="selected() === cat"
          (click)="select(cat)">
          {{ cat }}
        </li>
      }
    </ul>
  }

</div>
