<app-header theme="light" />

<main class="new-survey" aria-labelledby="new-survey-title">
    <div class="container">

        <div class="new-survey__card">

            <div class="new-survey__header">
                <span class="new-survey__badge">Draft</span>
                <a class="new-survey__close new-survey__close--mobile" routerLink="/"
                    aria-label="Zurück zur Startseite">
                    <img src="assets/images/xbtn-brown.svg" alt="">
                </a>
                <a class="new-survey__close new-survey__close--laptop" routerLink="/">
                    <app-ui-button variant="cancel" label="Cancel" icon="assets/images/x.svg" />
                </a>
            </div>

            <h1 class="new-survey__title" id="new-survey-title">
                Create new survey
            </h1>


            <section class="new-survey__form" aria-label="Survey form">

                <div class="new-survey__fields">

                    <div class="new-survey__fields-top">

                        <div class="new-survey__field">
                            <label class="new-survey__label new-survey__label--wide" for="survey-name">
                                Survey name
                                <app-delete-btn />
                            </label>

                            <div class="new-survey__input-wrapper">
                                <input class="new-survey__input new-survey__input--wide" id="survey-name" type="text"
                                    placeholder="Survey name" aria-required="true">
                                <app-delete-btn />
                            </div>
                        </div>

                        <div class="new-survey__field">
                            <div class="new-survey__date-category">

                                <div class="new-survey__date-category-top">
                                    <label class="new-survey__label" for="survey-date">
                                        Set end date <span class="new-survey__optional">(optional)</span>
                                        <app-delete-btn />
                                    </label>
                                    <div class="new-survey__input-wrapper">
                                        <input class="new-survey__input new-survey__input--narrow" id="survey-date"
                                            type="date">
                                        <app-delete-btn />
                                    </div>
                                </div>

                                <app-survey-sort label="Choose category"
                                    (categorySelected)="onCategorySelected($event)" />

                            </div>
                        </div>

                    </div>

                    <div class="new-survey__field">
                        <label class="new-survey__label" for="survey-description">
                            Describing text <span class="new-survey__optional">(optional)</span>
                            <app-delete-btn />
                        </label>

                        <div class="new-survey__textarea-wrapper">
                            <textarea class="new-survey__input new-survey__input--textarea" id="survey-description"
                                rows="4"></textarea>
                            <app-delete-btn />
                        </div>

                        <app-ui-button class="new-survey__add-question-two" variant="add-question"
                            label="Add next question" icon="assets/images/add-circle-white.svg" />
                    </div>

                </div>

                <div class="new-survey__questions" aria-label="Survey questions">
                    <app-survey-question [questionIndex]="0" />
                </div>

                <app-ui-button class="new-survey__add-question" variant="add-question" label="Add next question"
                    icon="assets/images/add-circle-white.svg" />


            </section>

            <div class="new-survey__actions">
                <app-ui-button variant="publish" label="Publish" icon="assets/images/checkmark.svg" />
            </div>

        </div>

    </div>
</main>
