<article class="question" aria-labelledby="question-label-{{ questionIndex() }}">

  <div class="question__header">
    <label class="question__label" [id]="'question-label-' + questionIndex()">
      {{ questionIndex() + 1 }}. Question
    </label>
    <button
      class="question__delete"
      type="button"
      [attr.aria-label]="'Delete question ' + (questionIndex() + 1)"
      (click)="onDelete()">
      <img src="assets/images/trash-white.svg" alt="" aria-hidden="true">
    </button>
  </div>

  <input
    class="question__input"
    type="text"
    [id]="'question-' + questionIndex()"
    placeholder="Which date would work best for you?"
    [attr.aria-labelledby]="'question-label-' + questionIndex()">

  <div class="question__answers-header">
    <span class="question__answers-label">Answers</span>
    <label class="question__multiple">
      <input
        class="question__multiple-input"
        type="checkbox"
        [attr.aria-label]="'Allow multiple answers for question ' + (questionIndex() + 1)">
      <span class="question__multiple-label">Allow multiple answers</span>
    </label>
  </div>

  <div class="question__answers" aria-label="Answers">
    <!-- Hier müssen ab 1024px Das A. vordem Input field sein und der Mülleimer hinter dem Inputfield- -->
   <div class="question__answer">
  <div class="question__answer-top">
    <span class="question__answer-letter">A.</span>
    <button class="question__answer-delete question__answer-delete--mobile" type="button" aria-label="Delete answer A">
      <img src="assets/images/trash-white.svg" alt="" aria-hidden="true">
    </button>
  </div>
  <div class="question__answer-row">
    <input
      class="question__answer-input"
      type="text"
      placeholder="Answer A"
      aria-label="Answer A">
    <button class="question__answer-delete question__answer-delete--laptop" type="button" aria-label="Delete answer A">
      <img src="assets/images/trash-white.svg" alt="" aria-hidden="true">
    </button>
  </div>
</div>
    <!-- Hier Auch so bei jeder Antwort -->
  <div class="question__answer">
  <div class="question__answer-top">
    <span class="question__answer-letter">B.</span>
    <button class="question__answer-delete question__answer-delete--mobile" type="button" aria-label="Delete answer A">
      <img src="assets/images/trash-white.svg" alt="" aria-hidden="true">
    </button>
  </div>
  <div class="question__answer-row">
    <input
      class="question__answer-input"
      type="text"
      placeholder="Answer B"
      aria-label="Answer B">
    <button class="question__answer-delete question__answer-delete--laptop" type="button" aria-label="Delete answer B">
      <img src="assets/images/trash-white.svg" alt="" aria-hidden="true">
    </button>
  </div>
</div>
  </div>

  <button class="question__add-answer" type="button" aria-label="Add answer">
    Add answer
    <img src="assets/images/add-circle-white.svg" alt="" aria-hidden="true">
  </button>

</article>
