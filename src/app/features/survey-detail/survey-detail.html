<app-header theme="light" />

<main class="survey-detail" aria-labelledby="survey-title">
  <div class="container">

    <app-survey-form />

    <div class="survey-detail__toggle">
      <button class="results-toggle" [attr.aria-expanded]="resultsOpen()" aria-controls="results-panel"
        (click)="toggleResults()">
        <span class="results-toggle__label">{{ resultsOpen() ? 'Close results' : 'See results' }}</span>
        <img class="results-toggle__arrow" [class.results-toggle__arrow--open]="resultsOpen()"
          [class.results-toggle__arrow--orange]="arrowOrange()" [class.results-toggle__arrow--rotating]="isRotating()"
          src="assets/images/sort-arrow-black.svg" alt="">
      </button>
    </div>

    <app-survey-results
      id="results-panel"
      [isOpen]="resultsOpen()"
      aria-live="polite" />

  </div>
</main>
